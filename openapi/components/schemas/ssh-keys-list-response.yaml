type: object
required:
  - ssh_keys
  - total
properties:
  ssh_keys:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        scope:
          type: string
          description: The visibility scope of the SSH key ('private' or 'org')
          enum:
            - private
            - org
  total:
    type: integer
    format: int32
    description: The total number of SSH keys
