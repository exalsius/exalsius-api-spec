type: object
properties:
  id:
    type: string
    format: uuid
    description: The ID of the SSH key
    example: "123e4567-e89b-12d3-a456-426614174000"
  name:
    type: string
    description: The name of the SSH key
    example: "my-ssh-key"
  private_key:
    type: string
    description: The private key of the SSH key
    example: "-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA6b7QgYJnV...\n-----END RSA PRIVATE KEY-----\n"
  owner:
    type: string
    description: The owner of the SSH key
    example: "John Doe"
  namespace:
    type: string
    description: The namespace of the SSH key (organization namespace)
    example: "my-org-default"
  scope:
    type: string
    description: The visibility scope of the SSH key. 'private' keys are only accessible by the owner. 'org' keys are accessible by all members of the organization.
    enum:
      - private
      - org
    default: private
    example: "private"
required:
  - name
  - private_key