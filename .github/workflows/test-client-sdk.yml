name: Test Client SDK

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Generate client-sdk
        run: make generate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: ./client-sdk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test-requirements.txt

      - name: Run tests
        working-directory: ./client-sdk
        run: pytest --cov ./ --junitxml=test-report.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: client-sdk/coverage.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: client-sdk/test-report.xml

      - name: Publish test results
        uses: dorny/test-reporter@v2
        with:
          name: Unit Tests
          path: client-sdk/test-report.xml
          reporter: java-junit

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: test
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Generate client-sdk
        run: make generate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Set dev version
        working-directory: ./client-sdk
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          sed -i "s/^version = \".*\"/version = \"${VERSION}.dev${GITHUB_RUN_NUMBER}\"/" pyproject.toml

      - name: Build package
        working-directory: ./client-sdk
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: client-sdk/dist/